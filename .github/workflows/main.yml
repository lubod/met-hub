name: Build
on: [push]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REACT_APP_GOOGLE_CLIENT_ID: "dummy-client-id-for-ci"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npx tailwindcss -o esdist/fe/tailwind.css
      - run: NODE_OPTIONS="--max-old-space-size=4096" node esbuild.mjs

      - name: Run ESLint
        run: npm run lint
      - name: Run Typecheck
        run: npx tsc --noEmit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push met-hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: met-hub
          push: true
          tags: ghcr.io/lubod/met-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push met-hub-store
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: met-hub-store
          push: true
          tags: ghcr.io/lubod/met-hub-store:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "🍏 This job's status is ${{ job.status }}."
