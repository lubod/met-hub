name: Build
on: [push]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REACT_APP_GOOGLE_CLIENT_ID: "dummy-client-id-for-ci"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Initialize PostgreSQL Schema
        run: |
          docker run --network host --rm -i postgres:alpine psql -h localhost -U postgres -d postgres < pg-schema.sql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npx tailwindcss -o esdist/fe/tailwind.css
      - run: NODE_OPTIONS="--max-old-space-size=4096" node esbuild.mjs

      - name: Run ESLint
        run: npm run lint
      - name: Run Typecheck
        run: npx tsc --noEmit
      - name: Run Unit & API Tests
        run: npm test

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (Cache Miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright System Dependencies (Cache Hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push met-hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: met-hub
          push: true
          tags: ghcr.io/lubod/met-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push met-hub-store
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: met-hub-store
          push: true
          tags: ghcr.io/lubod/met-hub-store:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: echo "🍏 This job's status is ${{ job.status }}."
